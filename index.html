<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer — Minimal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="container">
    <header>
      <p class="label">SIMPLE TIMER APPLICATION</p>
      <p class="issue">PF-2</p>
    </header>

    <div class="rule"></div>

    <div class="time-block">
      <span id="timer">00:00:00</span>
    </div>

    <div class="rule"></div>

    <p class="status-line">STATUS — <strong id="status">READY</strong></p>

    <div class="controls">
      <button id="startBtn" class="btn">
        <span class="key">S</span>
        <span class="label-text">Start</span>
      </button>
      <button id="pauseBtn" class="btn">
        <span class="key">P</span>
        <span class="label-text">Pause</span>
      </button>
      <button id="resetBtn" class="btn">
        <span class="key">R</span>
        <span class="label-text">Reset</span>
      </button>
    </div>

    <footer>
      <p>MARNELIE CANICULA BSIT-2D</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
